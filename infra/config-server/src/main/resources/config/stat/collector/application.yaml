server:
  port: 0

spring:
  application:
    name: collector
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.LongSerializer
      value-serializer: ru.practicum.ewm.serializer.AvroSerializer
      client-id: stats.collector

kafka:
  topics:
    user-actions: stats.user-actions.v1

grpc:
  server:
    port: 0

logging:
  level:
    ru.practicum.stats: TRACE
    org:
      springframework: ERROR
      apache.kafka: WARN