server:
  port: 8080

management:
  endpoint:
    gateway:
      enabled: true
  endpoints:
    web:
      exposure:
        include: gateway,health,info

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: main_service_route
          uri: lb://main-service
          predicates:
            - Path=/admin/categories/**, /admin/compilations/**, /compilations/**, /events/**, /categories/**, /users/**, /users/{userId}/requests, /admin/events/**

        - id: stats_service_route
          uri: lb://stats-service
          predicates:
            - Path=/hit/**, /stats/**

        - id: user_service_route
          uri: lb://user-service
          predicates:
            - Path=/admin/users/**, /int/admin/users/**
